<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDT</title>
<link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="laws.css">
</head>
<body>
<div id="app" class="hidden">
  <div class="container">
    <header class="mdt-header">
      <div id="officerInfo" class="officer-info"></div>
      <div id="headerSearch" class="header-search"></div>
      <div class="header-actions">
        <button class="primary" onclick="refreshMdt()"><i class="fa fa-sync"></i></button>
        <button class="danger" onclick="closeMdt()"><i class="fa fa-times"></i></button>
      </div>
    </header>
    <div class="mdt-body">
      <aside class="sidebar" id="menu"></aside>
      <main class="content" id="content"></main>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script src="app.js"></script>
</body>
</html>
